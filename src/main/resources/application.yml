server:
  port: 8080

spring:
  application:
    name: zenith-gateway
  threads:
    virtual:
      enabled: true
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 2s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

zenith:
  rate-limit:
    enabled: true
    replenish-rate: 20
    burst-capacity: 20
    requested-tokens: 1
  audit:
    buffer-size: 20000
    redis-key: zg:audit:events
    redis-max-entries: 5000
  monitor:
    window-seconds: 10
    emit-interval-seconds: 1
  route:
    redis-key: zg:routes

resilience4j:
  timelimiter:
    instances:
      default:
        timeout-duration: 2s
  circuitbreaker:
    instances:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s

